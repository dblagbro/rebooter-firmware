[env:sonoff_s31]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
build_src_filter =
  +<*>
  -<bootstrap_main.cpp>

lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17
  Links2004/WebSockets@^2.6.1
  dancol90/ESP8266Ping@^1.0

build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
  -D NDEBUG

[env:sonoff_s31_bad_boot_test]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
build_src_filter =
  +<*>
  -<bootstrap_main.cpp>

lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  tzapu/WiFiManager@^2.0.17
  Links2004/WebSockets@^2.6.1
  dancol90/ESP8266Ping@^1.0

build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
  -D NDEBUG
  -D SAFE_FALLBACK_TEST_BAD_BOOT=1
  -D SAFE_FALLBACK_TEST_BAD_BOOT_DELAY_SECONDS=15

[env:sonoff_s31_bootstrap]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 9600
lib_deps =
  tzapu/WiFiManager@^2.0.17
build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
  -D NDEBUG
build_src_filter =
  +<bootstrap_main.cpp>
